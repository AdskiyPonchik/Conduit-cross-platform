stages:
  - exec

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - when: never

# Globale Einstellungen
image: csse/sdp-vue:latest  # Dein Basis-Image

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: 'false'  # Optional: Telemetrie deaktivieren
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

exec:
  stage: exec
  before_script:
    # Starte .NET API im Hintergrund
    - cd apps/dotnet
    - dotnet run --project src/Api --no-launch-profile --urls "http://localhost:5000" &
    - DOTNET_PID=$!
    - echo $DOTNET_PID > /tmp/dotnet_api.pid
    - echo "Started .NET API with PID $DOTNET_PID"
    
    # Warte, bis die API bereit ist (max 60 Sekunden)
    - |
      echo "Waiting for .NET API to be ready..."
      sleep 10
      for i in $(seq 1 10); do
        if curl -f http://localhost:5000/api/tags > /dev/null 2>&1; then
          echo "API is ready after $((i*5)) seconds!"
          break
        fi
        echo "Attempt $i/10 - API not ready yet, waiting..."
        sleep 5
      done
  script:
    - cd ../vue
    - pnpm install
    - pnpm test
    
  after_script:
    # Beende die .NET API
    - |
      if [ -f /tmp/dotnet_api.pid ]; then
        DOTNET_PID=$(cat /tmp/dotnet_api.pid)
        kill $DOTNET_PID 2>/dev/null && echo "Stopped .NET API (PID: $DOTNET_PID)" || echo "API already stopped"
        rm -f /tmp/dotnet_api.pid
      fi
    # Sicherheitshalber alle dotnet-Prozesse beenden
    - pkill -f "dotnet run" || true
