stages:
  - exec

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - when: never

# Globale Einstellungen
image: csse/sdp-dotnet:latest  # Dein Basis-Image

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: 'false'  # Optional: Telemetrie deaktivieren
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

exec:
  stage: exec
  script:
    - cd apps/dotnet
    - dotnet restore
    - dotnet build --no-restore --configuration Release
    - dotnet test --no-build --no-restore --configuration Release --logger "trx;LogFileName=test-results.trx"
